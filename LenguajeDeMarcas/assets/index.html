<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAPPINESS&Co - Agenda Cultural</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="flex justify-between items-center p-4 bg-white shadow-sm">
        <div class="text-2xl font-bold text-[#ba007c]">HAPPINESS<span class="text-gray-400">&</span>Co</div>
        <ul class="hidden md:flex gap-6 font-medium">
            <li>Inicio</li>
            <li>Eventos</li>
            <li>Calendario</li>
            <li>Asturias</li>
        </ul>
        <div class="relative">
            <input type="text" placeholder="Search..." class="border rounded-full py-1 px-4 bg-gray-100 text-sm">
        </div>
    </nav>

    <header class="relative h-[500px] flex items-center justify-center text-white overflow-hidden">
        <img src="tu-imagen-de-asturias.jpg" class="absolute w-full h-full object-cover brightness-50" alt="Asturias">
        <div class="relative text-center px-4">
            <h1 class="text-5xl font-bold mb-4">Cultura que <span class="text-[#ba007c]">emociona</span></h1>
            <p class="mb-8">Descubre los mejores eventos de Asturias. Música, teatro, exposiciones y más.</p>
            <div class="flex gap-4 justify-center">
                <button class="bg-white/20 backdrop-blur-md border border-white py-2 px-6 rounded-lg">Explora eventos 📂</button>
                <button class="bg-white/20 backdrop-blur-md border border-white py-2 px-6 rounded-lg">Eventos Asturias 📍</button>
            </div>
        </div>
    </header>

    <section class="flex flex-wrap justify-center gap-3 p-8 bg-gray-800 text-white">
        <button class="px-4 py-2 bg-gray-700 rounded-md">Todos ✨</button>
        <button class="px-4 py-2 bg-gray-700 rounded-md">Música 🎶</button>
        <button class="px-4 py-2 bg-gray-700 rounded-md">Cine 🎬</button>
        <button class="px-4 py-2 bg-gray-700 rounded-md">Teatro 🎭</button>
        <button class="px-4 py-2 bg-gray-700 rounded-md">Arte 🎨</button>
    </section>

    <main class="max-w-6xl mx-auto p-12 text-center">
        <h2 class="text-4xl font-bold mb-8">Todos los <span class="text-[#ff7b00]">eventos</span></h2>
        <p class="text-gray-500 mb-12">8 eventos disponibles</p>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-8">
            <div class="h-80 bg-white rounded-3xl border-2 border-pink-100 shadow-xl shadow-pink-50"></div>
            <div class="h-80 bg-white rounded-3xl border-2 border-pink-100 shadow-xl shadow-pink-50"></div>
            <div class="h-80 bg-white rounded-3xl border-2 border-pink-100 shadow-xl shadow-pink-50"></div>
            <div class="h-80 bg-white rounded-3xl border-2 border-pink-100 shadow-xl shadow-pink-50"></div>
        </div>
    </main>

    <footer class="bg-gray-900 text-white p-12 text-center mt-12">
        <div class="text-3xl font-bold mb-4">HAPPINESS&Co</div>
        <p class="text-sm text-gray-400">© 2026 HAPPINESS&Co. Todos los derechos reservados. Hecho con ♥ en Asturias</p>
    </footer>

</body>
</html>
